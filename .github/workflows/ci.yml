name: CI

on:
  push:
    branches: [master, develop]
    paths:
      - 'frontend/**'
      - 'backend/**'
  pull_request:
    branches: [master, develop]
    paths:
      - 'frontend/**'
      - 'backend/**'

jobs:
  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            frontend-empleados/package-lock.json

      - name: Instalar dependencias
        run: |
          if [ -d frontend ]; then
            cd frontend
          elif [ -d frontend-empleados ]; then
            cd frontend-empleados
          else
            echo "No se encontro frontend/ ni frontend-empleados/"
            exit 1
          fi
          npm ci

      - name: Ejecutar pruebas unitarias
        run: |
          if [ -d frontend ]; then
            cd frontend
          elif [ -d frontend-empleados ]; then
            cd frontend-empleados
          else
            echo "No se encontro frontend/ ni frontend-empleados/"
            exit 1
          fi
          npm test -- --watch=false --no-progress

  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Instalar dependencias
        run: mvn -B -ntp dependency:resolve

      - name: Ejecutar pruebas unitarias
        run: mvn -B -ntp test

  test-validation:
    name: Test Validation
    runs-on: ubuntu-latest
    needs: [test-frontend, test-backend]
    if: always()

    steps:
      - name: Validar resultados de pruebas
        run: |
          if [ "${{ needs.test-frontend.result }}" != "success" ] || [ "${{ needs.test-backend.result }}" != "success" ]; then
            echo "Al menos una suite de pruebas fallo. Se bloquea el merge."
            exit 1
          fi
          echo "Todas las pruebas pasaron correctamente."
