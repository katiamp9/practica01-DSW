name: CI

on:
  push:
    branches: [master, release, develop]
    paths:
      - 'frontend-empleados/**'
      - 'src/**'
      - 'pom.xml'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [master, release, develop]
    paths:
      - 'frontend-empleados/**'
      - 'src/**'
      - 'pom.xml'
      - '.github/workflows/ci.yml'

jobs:
  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend-empleados/package-lock.json

      - name: Configurar Chrome Headless
        run: |
          if ! command -v google-chrome >/dev/null 2>&1 && ! command -v chromium-browser >/dev/null 2>&1 && ! command -v chromium >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y chromium-browser
          fi

          CHROME_PATH="$(command -v google-chrome || command -v chromium-browser || command -v chromium)"
          echo "CHROME_BIN=${CHROME_PATH}" >> "$GITHUB_ENV"

      - name: Instalar dependencias
        working-directory: ./frontend-empleados
        run: npm ci

      - name: Ejecutar pruebas unitarias
        working-directory: ./frontend-empleados
        run: npm test -- --watch=false --no-progress --browsers=ChromeHeadless

      - name: Ejecutar Cypress login E2E
        uses: cypress-io/github-action@v6
        with:
          working-directory: frontend-empleados
          install: false
          start: npm start -- --host 0.0.0.0 --port 4200
          wait-on: 'http://localhost:4200/login'
          wait-on-timeout: 120
          browser: chrome
          spec: cypress/e2e/login-darkmode.cy.ts
        env:
          CYPRESS_baseUrl: http://localhost:4200

  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Instalar dependencias
        run: mvn -B -ntp dependency:resolve

      - name: Ejecutar pruebas unitarias
        run: mvn -B -ntp test

  test-validation:
    name: Test Validation
    runs-on: ubuntu-latest
    needs: [test-frontend, test-backend]
    if: always()

    steps:
      - name: Validar resultados de pruebas
        run: |
          if [ "${{ needs.test-frontend.result }}" != "success" ] || [ "${{ needs.test-backend.result }}" != "success" ]; then
            echo "Al menos una suite de pruebas fallo. Se bloquea el merge."
            exit 1
          fi
          echo "Todas las pruebas pasaron correctamente."
