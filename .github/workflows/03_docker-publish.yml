name: Docker Publish

on:
  push:
    branches: [master]

env:
  REGISTRY: docker.io
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build Backend con Maven
        run: mvn clean package -DskipTests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build y Push Backend a Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/empleados-back:latest
            ${{ env.DOCKERHUB_USERNAME }}/empleados-back:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build y Push Frontend a Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: ./frontend-empleados
          file: ./frontend-empleados/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/empleados-front:latest
            ${{ env.DOCKERHUB_USERNAME }}/empleados-front:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
