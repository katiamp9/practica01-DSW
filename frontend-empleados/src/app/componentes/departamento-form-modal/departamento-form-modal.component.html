<div class="modal-backdrop">
  <section class="modal-card" role="dialog" aria-modal="true" aria-labelledby="departamento-modal-title">
    <header class="modal-header">
      <h3 id="departamento-modal-title">
        {{ mode === 'create' ? 'Crear departamento' : 'Editar departamento' }}
      </h3>
      <p>Completa el nombre del área para guardar los cambios.</p>
    </header>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="modal-form">
      <label>
        <span>Nombre *</span>
        <input type="text" formControlName="nombre" />
        <small *ngIf="form.controls.nombre.touched && form.controls.nombre.hasError('required')">
          El nombre es obligatorio.
        </small>
      </label>

      <p class="error" *ngIf="operationError">{{ operationError }}</p>

      <div class="actions">
        <button type="button" class="btn btn-ghost" (click)="onCancel()" [disabled]="submitting">Cancelar</button>
        <button type="submit" class="btn btn-primary" [disabled]="submitting">
          {{ submitting ? 'Guardando...' : mode === 'create' ? 'Crear' : 'Guardar' }}
        </button>
      </div>
    </form>
  </section>
</div>
