services:
  postgres:
    image: postgres:16
    container_name: empleados-postgres
    environment:
      POSTGRES_DB: empleados
      POSTGRES_USER: empleados_user
      POSTGRES_PASSWORD: empleados_pass
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U empleados_user -d empleados"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal_net

  app:
    image: empleados-app:latest
    container_name: empleados-app
    build:
      context: ../..
      dockerfile: Dockerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/empleados
      SPRING_DATASOURCE_USERNAME: empleados_user
      SPRING_DATASOURCE_PASSWORD: empleados_pass
      SERVER_PORT: 8080
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - internal_net

  frontend:
    image: empleados-frontend:latest
    container_name: empleados-frontend
    build:
      context: ../../frontend-empleados
      dockerfile: Dockerfile
    depends_on:
      app:
        condition: service_healthy
    networks:
      - internal_net

  proxy:
    image: nginx:1.27-alpine
    container_name: empleados-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_healthy
      frontend:
        condition: service_started
    networks:
      - internal_net

volumes:
  postgres_data:

networks:
  internal_net:
    driver: bridge

  
